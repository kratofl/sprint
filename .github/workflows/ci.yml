name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  go:
    name: Go (test + vet)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: api/go.mod

      - name: Vet API
        run: go vet ./api/... ./pkg/...

      - name: Vet desktop app
        run: |
          cd app/frontend && pnpm install --frozen-lockfile && pnpm run build
          cd ../.. && cd app && go vet ./...
        continue-on-error: true  # requires Wails + built frontend

      - name: Test API
        run: go test ./api/...

      - name: Test shared packages
        run: go test ./pkg/...

  typescript:
    name: TypeScript (lint + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: '10.32.1'

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared packages
        run: |
          pnpm --filter @sprint/types build
          pnpm --filter @sprint/ui build

      - name: Type check web
        run: pnpm --filter @sprint/web type-check

      - name: Build web
        run: pnpm --filter @sprint/web build

      - name: Build desktop frontend
        run: pnpm --filter @sprint/desktop build
