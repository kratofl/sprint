name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  go:
    name: Go (test + vet)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: api/go.mod

      - name: Vet API
        run: go vet ./api/... ./pkg/...

      - name: Vet desktop app
        run: |
          cd app/frontend && pnpm install --frozen-lockfile && pnpm run build
          cd ../.. && cd app && go vet ./...
        continue-on-error: true  # requires Wails + built frontend

      - name: Test API
        run: go test ./api/...

      - name: Test shared packages
        run: go test ./pkg/...

  typescript:
    name: TypeScript (lint + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
        with:
          version: '10.32.1'

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared packages
        run: |
          pnpm --filter @sprint/types build
          pnpm --filter @sprint/ui build

      - name: Type check web
        run: pnpm --filter @sprint/web type-check

      - name: Build web
        run: pnpm --filter @sprint/web build

      - name: Build desktop frontend
        run: pnpm --filter @sprint/desktop build
