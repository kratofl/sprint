name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: read

jobs:
  build-desktop:
    name: Desktop (Windows)
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Extract version and channel
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}" -replace '^v', ''
          "VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          $lower = $version.ToLower()
          $isPrerelease = ($lower -match 'alpha|beta').ToString().ToLower()
          "IS_PRERELEASE=$isPrerelease" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: app/go.mod

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: '10.32.1'

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Update wails.json productVersion
        shell: pwsh
        working-directory: app
        run: |
          $config = Get-Content wails.json -Raw | ConvertFrom-Json
          $config.info.productVersion = "${{ env.VERSION }}"
          $config | ConvertTo-Json -Depth 10 | Set-Content wails.json -Encoding utf8

      - name: Build desktop app
        working-directory: app
        run: wails build -clean -ldflags "-X main.Version=${{ env.VERSION }}"

      - name: Copy preset files
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path app/build/bin/DeviceCatalog | Out-Null
          Copy-Item app/presets/devices/*.json app/build/bin/DeviceCatalog/
          Copy-Item app/presets/dash/default.json app/build/bin/DefaultDash.json

      - name: Build Windows installer
        shell: pwsh
        working-directory: app/build/windows/installer
        run: makensis /DVERSION=${{ env.VERSION }} project.nsi

      - name: Rename artifacts
        shell: pwsh
        run: |
          Move-Item app/build/bin/Sprint.exe "app/build/bin/sprint-${{ github.ref_name }}-windows-amd64.exe"
          Move-Item app/build/bin/Sprint-amd64-installer.exe "app/build/bin/sprint-${{ github.ref_name }}-windows-amd64-installer.exe"

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          files: |
            app/build/bin/sprint-${{ github.ref_name }}-windows-amd64-installer.exe
            app/build/bin/sprint-${{ github.ref_name }}-windows-amd64.exe
          generate_release_notes: true
          prerelease: ${{ env.IS_PRERELEASE == 'true' }}

