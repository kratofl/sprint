<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 168 26" fill="none" role="img" aria-label="Sprint">
  <!-- Icon mark scaled to 26px height (scale = 26/32 = 0.8125) -->
  <g transform="scale(0.8125)">
    <!-- Teal baseline -->
    <line x1="0" y1="28" x2="48" y2="28" stroke="#1EA58C" stroke-width="2" stroke-linecap="square"/>
    <!-- Orange forward-leaning spike -->
    <polygon points="4,28 19,4 42,28" fill="#EF8118"/>
  </g>
  <!-- Wordmark: SPRINT in Barlow Condensed Bold -->
  <text
    x="50"
    y="23"
    font-family="Barlow Condensed, system-ui, sans-serif"
    font-weight="700"
    font-size="17"
    letter-spacing="2.5"
    fill="#F4F4F5"
  >SPRINT</text>
</svg>
